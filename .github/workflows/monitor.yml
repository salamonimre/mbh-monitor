name: MBH Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Wait for FlareSolverr
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8191/v1 && break
            echo "Waiting for FlareSolverr... ($i)"
            sleep 2
          done

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_THRESHOLD: ${{ vars.ALERT_THRESHOLD || '10' }}
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: python -m src.main

      - name: Commit state changes
        if: always()
        run: |
          git config user.name  "mbh-monitor-bot"
          git config user.email "mbh-monitor-bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
