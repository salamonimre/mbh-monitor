name: MBH Monitor

on:
  schedule:
    - cron: '17,47 * * * *'  # Offset: cron-job.org runs at :00/:30
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services:
      solver:
        image: ${{ vars.SOLVER_IMAGE || 'ghcr.io/flaresolverr/flaresolverr:latest' }}
        ports:
          - 8191:8191

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Wait for solver
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8191/v1 && break
            echo "Waiting for solver... ($i)"
            sleep 2
          done

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_THRESHOLD: ${{ vars.ALERT_THRESHOLD || '10' }}
          FLARESOLVERR_URL: http://localhost:8191/v1
          DOWNDETECTOR_URL: ${{ vars.DOWNDETECTOR_URL || 'https://downdetector.hu/problema/mbh-bank/' }}
          HEARTBEAT_ENABLED: ${{ vars.HEARTBEAT_ENABLED || 'true' }}
          HEARTBEAT_HOURS: ${{ vars.HEARTBEAT_HOURS || '9,19' }}
          PAT_EXPIRY_DATE: ${{ vars.PAT_EXPIRY_DATE || '2026-07-25' }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
        run: python -m src.main

      - name: Upload debug HTML if parse failed
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-${{ github.run_id }}
          path: /tmp/debug_response.html
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit state changes
        if: always()
        run: |
          set +e  # We handle errors manually in this step
          git config user.name  "mbh-monitor-bot"
          git config user.email "mbh-monitor-bot@users.noreply.github.com"

          # Save our state before any git operations
          cp state.json /tmp/state_backup.json
          [ -f history.csv ] && cp history.csv /tmp/history_backup.csv

          # Initial commit of local changes
          git add state.json
          [ -f history.csv ] && git add history.csv
          git diff --cached --quiet && { echo "No state changes to commit"; exit 0; }
          git commit -m "chore: update state [skip ci]"

          # Retry loop: fetch remote, rebase, push
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Push attempt $attempt/$MAX_ATTEMPTS ==="

            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi

            echo "Push failed, remote has diverged. Recovering..."

            # Clean up any stuck rebase state
            git rebase --abort 2>/dev/null || true

            # Fetch latest remote state
            git fetch origin main

            # Reset to remote, then re-apply our state on top
            git reset --hard origin/main
            cp /tmp/state_backup.json state.json
            [ -f /tmp/history_backup.csv ] && cp /tmp/history_backup.csv history.csv
            git add state.json
            [ -f history.csv ] && git add history.csv
            git diff --cached --quiet && { echo "State unchanged after reset, nothing to push"; exit 0; }
            git commit -m "chore: update state [skip ci]"
          done

          echo "::warning::Failed to push state.json after $MAX_ATTEMPTS attempts"
          exit 0  # Don't fail the workflow, state will be retried next run
